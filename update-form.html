<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Enviar compra</title>
<style>
body { font-family: Arial; background:#1e1e2e; color:white; padding:40px; }
input { width:100%; padding:10px; margin:10px 0; border-radius:8px; }
button { padding:12px; background:#00c8ff; border:none; border-radius:8px; cursor:pointer; }
.section { background:#2b2b3b; padding:20px; border-radius:12px; margin-bottom:30px; }
</style>
</head>
<body>

<h1>🛒 Enviar compra</h1>

<div class="section">
    <form action="https://formspree.io/f/mreodvop" method="POST">
        
        <label>Nombre y apellidos</label>
        <input name="nombre" required>

        

        <label>Chapa comprada</label>
        <input name="chapa" required>

        <button type="submit">Enviar</button>
    </form>
</div>

</body>
</html>
