<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Chapas - CodeLearn</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e1e2e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .layout {
            display: flex;
            gap: 30px;
            width: 90%;
            max-width: 1000px;
        }

        .col {
            flex: 1;
            background: #2b2b3b;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* SELECT PERSONALIZADO */
        .select-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        .select-display {
            background: #fff;
            color: #000;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
        }

        .select-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            color: #000;
            border-radius: 8px;
            margin-top: 5px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
        }

        .select-options div {
            padding: 10px;
            cursor: pointer;
        }

        .select-options div:hover {
            background: #e0e0e0;
        }

        .tarjeta {
            background: #3f3f57;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #00c8ff;
        }

        .nombre {
            font-weight: bold;
            font-size: 1.1em;
            color: #00c8ff;
        }

        .chapa {
            color: #ffcc00;
            margin-top: 5px;
        }

        .top-item {
            background: #3f3f57;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #ffcc00;
        }

        .top-title {
            font-size: 1.3em;
            margin-bottom: 15px;
            color: #ffcc00;
            font-weight: bold;
        }
        .resto-item {
            background: #2d2d3d;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 0.9em;
            border-left: 4px solid #555;
        }
        .boton-gestion {
            display: inline-block;
            padding: 12px 20px;
            background: #00c8ff;
            color: #000;
            font-weight: bold;
            border-radius: 10px;
            text-decoration: none;
            margin-bottom: 20px;
            transition: 0.2s;
        }

        .boton-gestion:hover {
            background: #00a0d1;
        }


    </style>
</head>

<body>

    <div class="layout">

        <!-- COLUMNA IZQUIERDA -->
        <div class="col">
            <h2>🏅 Chapas por Alumno</h2>

                <a href="update-form.html" class="boton-gestion">Compras y +</a>

            <div class="select-wrapper">
                <div class="select-display">Selecciona un alumno...</div>
                <div class="select-options" id="listaAlumnos"></div>
            </div>

            <div id="lista"></div>
        </div>

        <!-- COLUMNA DERECHA -->
        <div class="col">
            <h2 class="top-title">🔥 Top 3 más vendidas</h2>
        <div id="top3"></div>

            <h3 style="margin-top:25px; color:#ccc;">📦 Resto de chapas</h3>
        <div id="resto"></div>
    </div>


    </div>

    <script>
        let registrosXML = [];

// Cargar XML al iniciar
window.onload = async function () {
    try {
        const res = await fetch('datos.xml?cache=' + Date.now());
        const xmlText = await res.text();
        const xml = new DOMParser().parseFromString(xmlText, "application/xml");

        registrosXML = xml.getElementsByTagName("ComprasPorAlumno");

        // --- LISTA DE ALUMNOS ---
        let alumnos = new Set();
        for (let i = 0; i < registrosXML.length; i++) {
            let nombre = registrosXML[i].getElementsByTagName("nombre")[0]?.textContent;
            if (nombre) alumnos.add(nombre);
        }

        const listaOrdenada = [...alumnos].sort((a, b) => a.localeCompare(b));

        const opciones = document.getElementById("listaAlumnos");
        listaOrdenada.forEach(nombre => {
            opciones.innerHTML += `<div onclick="seleccionarAlumno('${nombre}')">${nombre}</div>`;
        });

        // --- TOP 3 + RESTO ---
        calcularTop3();

    } catch (err) {
        console.error("Error cargando el XML:", err);
    }
};

// Abrir/cerrar menú
document.querySelector(".select-display").onclick = function () {
    const menu = document.querySelector(".select-options");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
};

// Seleccionar alumno
function seleccionarAlumno(nombre) {
    document.querySelector(".select-display").textContent = nombre;
    document.querySelector(".select-options").style.display = "none";
    mostrarChapas(nombre);
}

// Mostrar chapas del alumno
function mostrarChapas(alumno) {
    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    for (let i = 0; i < registrosXML.length; i++) {
        let nombre = registrosXML[i].getElementsByTagName("nombre")[0]?.textContent;
        let chapa = registrosXML[i].getElementsByTagName("Nombre_x0020_chapa")[0]?.textContent;

        if (nombre === alumno) {
            lista.innerHTML += `
                <div class="tarjeta">
                    <div class="nombre">👤 ${nombre}</div>
                    <div class="chapa">🏅 Chapa: ${chapa}</div>
                </div>`;
        }
    }
}

// Calcular TOP 3 + resto
function calcularTop3() {
    let contador = {};

    // Contar ventas por chapa
    for (let i = 0; i < registrosXML.length; i++) {
        let chapa = registrosXML[i].getElementsByTagName("Nombre_x0020_chapa")[0]?.textContent;
        if (!contador[chapa]) contador[chapa] = 0;
        contador[chapa]++;
    }

    // Ordenar por ventas
    let ordenado = Object.entries(contador)
        .sort((a, b) => b[1] - a[1]);

    // Top 3
    let top = ordenado.slice(0, 3);

    const topDiv = document.getElementById("top3");
    topDiv.innerHTML = "";

    top.forEach(([chapa, cantidad], i) => {
        topDiv.innerHTML += `
            <div class="top-item">
                <div><strong>${i + 1}. ${chapa}</strong></div>
                <div>Ventas: ${cantidad}</div>
            </div>`;
    });

    // Resto de chapas
    const restoDiv = document.getElementById("resto");
    restoDiv.innerHTML = "";

    ordenado.slice(3).forEach(([chapa, cantidad]) => {
        restoDiv.innerHTML += `
            <div class="resto-item">
                ${chapa} — ${cantidad} ventas
            </div>`;
    });
}

// Cerrar menú si haces clic fuera
document.addEventListener("click", function(e) {
    if (!document.querySelector(".select-wrapper").contains(e.target)) {
        document.querySelector(".select-options").style.display = "none";
    }
});

    </script>

</body>
</html>
