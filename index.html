<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Chapas - CodeLearn</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e1e2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .container {
            background: #2b2b3b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 500px;
        }

        /* SELECT NORMAL */
        select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 16px;
            box-sizing: border-box;
            background: #fff;
            color: #000;
        }

        /* El menú desplegable tendrá scroll si hay muchos alumnos */
        select option {
            padding: 10px;
        }

        .tarjeta {
            background: #3f3f57;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #00c8ff;
        }

        .nombre {
            font-weight: bold;
            font-size: 1.1em;
            color: #00c8ff;
        }

        .chapa {
            color: #ffcc00;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🏅 Chapas por Alumno</h2>

        <!-- SELECT NORMAL (solo 1 línea visible) -->
        <select id="selectorAlumnos" onchange="mostrarChapas()">
            <option value="">Selecciona un alumno...</option>
        </select>

        <div id="lista"></div>
    </div>

    <script>
        let registrosXML = [];

        // Cargar XML al iniciar
        window.onload = async function () {
            try {
                const res = await fetch('datos.xml?cache=' + Date.now());
                const xmlText = await res.text();
                const xml = new DOMParser().parseFromString(xmlText, "application/xml");

                registrosXML = xml.getElementsByTagName("ComprasPorAlumno");

                // Obtener lista única de alumnos
                let alumnos = new Set();
                for (let i = 0; i < registrosXML.length; i++) {
                    let nombre = registrosXML[i].getElementsByTagName("nombre")[0]?.textContent;
                    if (nombre) alumnos.add(nombre);
                }

                // Ordenar alfabéticamente
                const listaOrdenada = [...alumnos].sort((a, b) => a.localeCompare(b));

                // Rellenar el selector
                const selector = document.getElementById("selectorAlumnos");
                listaOrdenada.forEach(nombre => {
                    selector.innerHTML += `<option value="${nombre}">${nombre}</option>`;
                });

            } catch (err) {
                console.error("Error cargando el XML:", err);
            }
        };

        // Mostrar chapas del alumno seleccionado
        function mostrarChapas() {
            const alumno = document.getElementById("selectorAlumnos").value;
            const lista = document.getElementById("lista");
            lista.innerHTML = "";

            if (!alumno) return;

            for (let i = 0; i < registrosXML.length; i++) {
                let nombre = registrosXML[i].getElementsByTagName("nombre")[0]?.textContent;
                let chapa = registrosXML[i].getElementsByTagName("Nombre_x0020_chapa")[0]?.textContent;

                if (nombre === alumno) {
                    lista.innerHTML += `
                        <div class="tarjeta">
                            <div class="nombre">👤 ${nombre}</div>
                            <div class="chapa">🏅 Chapa: ${chapa}</div>
                        </div>`;
                }
            }
        }
    </script>

</body>
</html>
