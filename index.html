<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buscador de Chapas - CodeLearn</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e1e2e;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
        }

        .container {
            background: #2b2b3b;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 500px;
        }

        /* SELECT PERSONALIZADO */
        .select-wrapper {
            position: relative;
            width: 100%;
        }

        .select-display {
            background: #fff;
            color: #000;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
        }

        .select-options {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            color: #000;
            border-radius: 8px;
            margin-top: 5px;
            max-height: 150px; /* ALTURA DEL MENÚ */
            overflow-y: auto;  /* SCROLL FORZADO */
            display: none;     /* OCULTO POR DEFECTO */
            z-index: 1000;
        }

        .select-options div {
            padding: 10px;
            cursor: pointer;
        }

        .select-options div:hover {
            background: #e0e0e0;
        }

        .tarjeta {
            background: #3f3f57;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #00c8ff;
        }

        .nombre {
            font-weight: bold;
            font-size: 1.1em;
            color: #00c8ff;
        }

        .chapa {
            color: #ffcc00;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>🏅 Chapas por Alumno</h2>

        <!-- SELECT PERSONALIZADO -->
        <div class="select-wrapper">
            <div class="select-display">Selecciona un alumno...</div>
            <div class="select-options" id="listaAlumnos"></div>
        </div>

        <div id="lista"></div>
    </div>

    <script>
        let registrosXML = [];

        window.onload = async function () {
            try {
                const res = await fetch('datos.xml?cache=' + Date.now());
                const xmlText = await res.text();
                const xml = new DOMParser().parseFromString(xmlText, "application/xml");

                registrosXML = xml.getElementsByTagName("ComprasPorAlumno");

                let alumnos = new Set();
                for (let i = 0; i < registrosXML.length; i++) {
                    let nombre = registrosXML[i].getElementsByTagName("nombre")[0]?.textContent;
                    if (nombre) alumnos.add(nombre);
                }

                const listaOrdenada = [...alumnos].sort((a, b) => a.localeCompare(b));

                const opciones = document.getElementById("listaAlumnos");
                listaOrdenada.forEach(nombre => {
                    opciones.innerHTML += `<div onclick="seleccionarAlumno('${nombre}')">${nombre}</div>`;
                });

            } catch (err) {
                console.error("Error cargando el XML:", err);
            }
        };

        // Abrir/cerrar menú
        document.querySelector(".select-display").onclick = function () {
            const menu = document.querySelector(".select-options");
            menu.style.display = menu.style.display === "block" ? "none" : "block";
        };

        // Seleccionar alumno
        function seleccionarAlumno(nombre) {
            document.querySelector(".select-display").textContent = nombre;
            document.querySelector(".select-options").style.display = "none";
            mostrarChapas(nombre);
        }

        // Mostrar chapas
        function mostrarChapas(alumno) {
            const lista = document.getElementById("lista");
            lista.innerHTML = "";

            for (let i = 0; i < registrosXML.length; i++) {
                let nombre = registrosXML[i].getElementsByTagName("nombre")[0]?.textContent;
                let chapa = registrosXML[i].getElementsByTagName("Nombre_x0020_chapa")[0]?.textContent;

                if (nombre === alumno) {
                    lista.innerHTML += `
                        <div class="tarjeta">
                            <div class="nombre">👤 ${nombre}</div>
                            <div class="chapa">🏅 Chapa: ${chapa}</div>
                        </div>`;
                }
            }
        }

        // Cerrar menú si haces clic fuera
        document.addEventListener("click", function(e) {
            if (!document.querySelector(".select-wrapper").contains(e.target)) {
                document.querySelector(".select-options").style.display = "none";
            }
        });
    </script>

</body>
</html>
